<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Healthy - Fruit - Foodiesfeed</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Oxygen,Ubuntu,Cantarell,Open Sans,Helvetica Neue,sans-serif}
body{background:#f7f7f7;color:#333;line-height:1.6}
/* 顶部固定导航 */
.header{position:fixed;top:0;left:0;right:0;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.08);z-index:999}
.header-inner{max-width:1400px;margin:0 auto;padding:18px 22px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:26px;font-weight:700;color:#ff5a3c;text-decoration:none}
/* 返回导航 */
.back-nav{max-width:1400px;margin:0 auto;padding:0 20px;padding-top:90px;padding-bottom:15px}
.back-nav a{text-decoration:none;color:#ff5a3c;font-size:14px}
/* 瀑布流图库 */
.container{max-width:1400px;margin:0 auto;padding:0 20px 40px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 5px rgba(0,0,0,0.05);transition:transform 0.3s}
.card:hover{transform:translateY(-5px)}
.card a{text-decoration:none;color:inherit}
.card img{width:100%;height:200px;object-fit:cover;display:block}
.card-info{padding:12px}
.card-title{font-size:14px;margin-bottom:4px;font-weight:500}
.card-tag{font-size:12px;color:#999}
/* 响应式适配 */
@media (max-width:768px){
    .grid{grid-template-columns:repeat(2,1fr)}
    .logo{font-size:22px}
}
@media (max-width:480px){
    .grid{grid-template-columns:1fr}
    .header-inner{padding:15px 18px}
}
</style>
</head>
<body>

<div class="header">
    <div class="header-inner">
        <a href="index.html" class="logo">Foodiesfeed</a>
    </div>
</div>

<div class="back-nav">
    <a href="cat-healthy.html">← Back to Healthy</a>
</div>

<div class="container">
    <h2 style="margin-bottom:20px;font-size:20px;font-weight:600">Healthy - Fresh Fruit</h2>
    <div class="grid">
        <div class="card">
            <a href="detail-healthy-fruit-1.html">
                <img src="https://picsum.photos/id/1080/600/400" alt="Fresh Strawberries">
                <div class="card-info">
                    <div class="card-title">Fresh Strawberries</div>
                    <div class="card-tag">Free Stock Photo</div>
                </div>
            </a>
        </div>
        <div class="card">
            <a href="detail-healthy-fruit-2.html">
                <img src="https://picsum.photos/id/429/600/400" alt="Colorful Fruit Medley">
                <div class="card-info">
                    <div class="card-title">Colorful Fruit Medley</div>
                    <div class="card-tag">Free Stock Photo</div>
                </div>
            </a>
        </div>
        <div class="card">
            <a href="detail-healthy-fruit-3.html">
                <img src="https://picsum.photos/id/139/600/400" alt="Fresh Mango">
                <div class="card-info">
                    <div class="card-title">Fresh Mango Slice</div>
                    <div class="card-tag">Free Stock Photo</div>
                </div>
            </a>
        </div>
        <div class="card">
            <a href="detail-healthy-fruit-4.html">
                <img src="https://picsum.photos/id/175/600/400" alt="Blueberries">
                <div class="card-info">
                    <div class="card-title">Fresh Blueberries</div>
                    <div class="card-tag">Free Stock Photo</div>
                </div>
            </a>
        </div>
    </div>
</div>

</body>
</html>
