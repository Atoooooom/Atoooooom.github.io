<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foodiesfeed 美食图库</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
}
body {
    background: #f7f7f7;
    color: #333;
    line-height: 1.6;
}

/* 顶部固定滚动导航栏 */
.top-header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    z-index: 999;
}
.header-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 18px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.logo {
    font-size: 24px;
    font-weight: 700;
    color: #ff5722;
    text-decoration: none;
}

/* 分类菜单栏 */
.category-nav {
    max-width: 1400px;
    margin: 0 auto;
    padding: 15px 20px;
    padding-top: 90px; /* 避开固定导航 */
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}
.category-nav a {
    padding: 7px 14px;
    background: #fff;
    border-radius: 20px;
    text-decoration: none;
    color: #555;
    font-size: 14px;
    transition: 0.3s;
}
.category-nav a:hover {
    background: #ff5722;
    color: #fff;
}

/* 容器 & 瀑布流网格 */
.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 20px 40px;
}
.section-title {
    font-size: 20px;
    margin: 20px 0;
    font-weight: 600;
}
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}
.card {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 3px 10px rgba(0,0,0,0.05);
    transition: transform 0.3s;
}
.card:hover {
    transform: translateY(-5px);
}
.card a {
    text-decoration: none;
    color: inherit;
}
.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    display: block;
}
.card-info {
    padding: 12px;
}
.card-title {
    font-size: 15px;
    margin-bottom: 6px;
}
.tag {
    display: inline-block;
    font-size: 12px;
    background: #f1f1f1;
    color: #777;
    padding: 2px 8px;
    border-radius: 12px;
    margin-right: 4px;
}

/* 页脚 */
.footer {
    text-align: center;
    padding: 30px;
    background: #fff;
    font-size: 13px;
    color: #888;
}

/* 响应式 */
@media (max-width:768px){
    .grid {grid-template-columns: repeat(2,1fr);}
}
@media (max-width:480px){
    .grid {grid-template-columns: 1fr;}
    .header-inner {padding:15px;}
}
</style>
</head>
<body>

<!-- 顶部滚动固定导航栏 -->
<div class="top-header">
    <div class="header-inner">
        <a href="index.html" class="logo">Foodiesfeed</a>
    </div>
</div>

<!-- 分类菜单（子链接入口） -->
<div class="category-nav">
    <a href="index.html">全部</a>
    <a href="breakfast.html">早餐</a>
    <a href="pizza.html">披萨</a>
    <a href="burger.html">汉堡</a>
    <a href="coffee.html">咖啡</a>
    <a href="dessert.html">甜点</a>
    <a href="fruit.html">水果</a>
</div>

<!-- 图库主体 -->
<div class="container">
    <h2 class="section-title">热门美食摄影</h2>
    <div class="grid">

        <!-- 作品带子链接 点击跳详情 -->
        <div class="card">
            <a href="detail1.html">
                <img src="https://picsum.photos/id/431/600/400" alt="营养早餐">
                <div class="card-info">
                    <div class="card-title">元气营养早餐</div>
                    <span class="tag">早餐</span>
                </div>
            </a>
        </div>

        <div class="card">
            <a href="detail2.html">
                <img src="https://picsum.photos/id/292/600/400" alt="芝士汉堡">
                <div class="card-info">
                    <div class="card-title">经典芝士汉堡</div>
                    <span class="tag">汉堡</span>
                </div>
            </a>
        </div>

        <div class="card">
            <a href="detail3.html">
                <img src="https://picsum.photos/id/488/600/400" alt="意式披萨">
                <div class="card-info">
                    <div class="card-title">意式萨拉米披萨</div>
                    <span class="tag">披萨</span>
                </div>
            </a>
        </div>

        <div class="card">
            <a href="detail4.html">
                <img src="https://picsum.photos/id/312/600/400" alt="精品咖啡">
                <div class="card-info">
                    <div class="card-title">手冲精品咖啡</div>
                    <span class="tag">咖啡</span>
                </div>
            </a>
        </div>

        <div class="card">
            <a href="detail5.html">
                <img src="https://picsum.photos/id/493/600/400" alt="草莓甜点">
                <div class="card-info">
                    <div class="card-title">草莓千层甜点</div>
                    <span class="tag">甜点</span>
                </div>
            </a>
        </div>

        <div class="card">
            <a href="detail6.html">
                <img src="https://picsum.photos/id/1080/600/400" alt="新鲜水果">
                <div class="card-info">
                    <div class="card-title">新鲜时令水果</div>
                    <span class="tag">水果</span>
                </div>
            </a>
        </div>

    </div>
</div>

<div class="footer">
    Foodiesfeed 美食图库 © 免费高清美食摄影素材
</div>

</body>
</html>
