<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bakery - Foodiesfeed</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Oxygen,Ubuntu,Cantarell,Open Sans,Helvetica Neue,sans-serif}
body{background:#f7f7f7;color:#333;line-height:1.6}
/* 顶部固定导航 */
.header{position:fixed;top:0;left:0;right:0;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.08);z-index:999}
.header-inner{max-width:1400px;margin:0 auto;padding:18px 22px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:26px;font-weight:700;color:#ff5a3c;text-decoration:none}
/* 横向可滚动分类栏 */
.cat-bar{max-width:1400px;margin:0 auto;padding:0 20px;overflow-x:auto;white-space:nowrap;padding-top:88px;padding-bottom:15px}
.cat-bar::-webkit-scrollbar{height:0}
.cat-list{display:flex;gap:12px}
.cat-list a{padding:8px 16px;background:#fff;border:1px solid #eee;border-radius:99px;text-decoration:none;color:#333;font-size:14px;transition:all 0.3s}
.cat-list a:hover,.cat-list a.active{background:#ff5a3c;color:#fff;border-color:#ff5a3c}
/* 子分类导航 */
.subcat-nav{max-width:1400px;margin:0 auto;padding:0 20px;margin-bottom:20px;display:flex;gap:10px;flex-wrap:wrap}
.subcat-nav a{padding:6px 12px;background:#fff;border:1px solid #eee;border-radius:8px;text-decoration:none;color:#333;font-size:13px}
.subcat-nav a:hover{border-color:#ff5a3c;color:#ff5a3c}
/* 瀑布流图库 */
.container{max-width:1400px;margin:0 auto;padding:0 20px 40px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 5px rgba(0,0,0,0.05);transition:transform 0.3s}
.card:hover{transform:translateY(-5px)}
.card a{text-decoration:none;color:inherit}
.card img{width:100%;height:200px;object-fit:cover;display:block}
.card-info{padding:12px}
.card-title{font-size:14px;margin-bottom:4px;font-weight:500}
.card-tag{font-size:12px;color:#999}
/* 响应式适配 */
@media (max-width:768px){
    .grid{grid-template-columns:repeat(2,1fr)}
    .logo{font-size:22px}
}
@media (max-width:480px){
    .grid{grid-template-columns:1fr}
    .header-inner{padding:15px 18px}
    .cat-list a{padding:6px 12px;font-size:13px}
}
</style>
</head>
<body>

<div class="header">
    <div class="header-inner">
        <a href="index.html" class="logo">Foodiesfeed</a>
    </div>
</div>

<div class="cat-bar">
    <div class="cat-list">
        <a href="index.html">Trending</a>
        <a href="cat-healthy.html">Healthy</a>
        <a href="cat-bakery.html" class="active">Bakery</a>
        <a href="cat-breakfast.html">Breakfast</a>
        <a href="cat-pizza.html">Pizza</a>
        <a href="cat-burger.html">Burger</a>
        <a href="cat-coffee.html">Coffee</a>
        <a href="cat-icecream.html">Ice Cream</a>
        <a href="cat-sushi.html">Sushi</a>
    </div>
</div>

<div class="subcat-nav">
    <a href="cat-bakery-cake.html">Cake (蛋糕)</a>
    <a href="cat-bakery-bread.html">Bread (面包)</a>
</div>

<div class="container">
    <div class="grid">
        <div class="card">
            <a href="detail-bakery-cake-1.html">
                <img src="https://picsum.photos/id/493/600/400" alt="Strawberry Cake">
                <div class="card-info">
                    <div class="card-title">Strawberry Layer Cake</div>
                    <div class="card-tag">Bakery / Cake</div>
                </div>
            </a>
        </div>
        <div class="card">
            <a href="detail-bakery-cake-2.html">
                <img src="https://picsum.photos/id/291/600/400" alt="Chocolate Cake">
                <div class="card-info">
                    <div class="card-title">Rich Chocolate Cake</div>
                    <div class="card-tag">Bakery / Cake</div>
                </div>
            </a>
        </div>
        <div class="card">
            <a href="detail-bakery-bread-1.html">
                <img src="https://picsum.photos/id/252/600/400" alt="Fresh Bread">
                <div class="card-info">
                    <div class="card-title">Fresh Homemade Bread</div>
                    <div class="card-tag">Bakery / Bread</div>
                </div>
            </a>
        </div>
        <div class="card">
            <a href="detail-bakery-bread-2.html">
                <img src="https://picsum.photos/id/315/600/400" alt="Croissant">
                <div class="card-info">
                    <div class="card-title">Buttery Croissant</div>
                    <div class="card-tag">Bakery / Bread</div>
                </div>
            </a>
        </div>
    </div>
</div>

</body>
</html>
